<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Proxy</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #0f0f0f; color: white;
            font-family: Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        #search-bar {
            padding: 15px; width: 100%; background: #222;
            display: flex; justify-content: center; gap: 10px; z-index: 10;
        }
        input {
            padding: 10px; width: 300px; border-radius: 20px;
            border: 1px solid #444; background: #111; color: white; outline: none;
        }
        button {
            padding: 10px 20px; border-radius: 20px; border: none;
            background: #ff0000; color: white; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #cc0000; }
        #video-container {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100%;
        }
        iframe {
            width: 100%; max-width: 400px; height: 75vh;
            border: none; border-radius: 15px; background: #000;
        }
        .controls {
            margin-top: 15px; display: flex; gap: 20px;
        }
        .controls button { background: #333; }
        .controls button:hover { background: #555; }
    </style>
</head>
<body>

    <div id="search-bar">
        <input type="text" id="searchInput" placeholder="Search for Shorts..." onkeydown="if(event.key === 'Enter') manualSearch()">
        <button onclick="manualSearch()">Search</button>
    </div>

    <div id="video-container">
        <iframe id="videoPlayer" allow="autoplay; fullscreen" src=""></iframe>
        <div class="controls">
            <button onclick="prevVideo()">↑ Previous</button>
            <button onclick="nextVideo()">↓ Next</button>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBLOCb3TzQhEtRdWYxeveNCCbTcXKw0eUs'; 
        
        let videos = [];
        let currentIndex = 0;
        let isScrolling = false;
        let videoStartTime = 0;
        let userProfile = {};
        let totalWeightedWatchTime = 0;

        function getRandomQuery() {
            const chars = "abcdefghijklmnopqrstuvwxyz";
            const length = Math.floor(Math.random() * 2) + 1;
            let res = "";
            for(let i=0; i<length; i++) res += chars[Math.floor(Math.random() * chars.length)];
            return res;
        }

        async function fetchVideos(isAutoFetch = false) {
            let query = document.getElementById('searchInput').value.trim();
            let internalQuery = query;
            
            if (query === "") {
                const tailorProbability = Math.min(totalWeightedWatchTime / 500, 0.85);
                
                if (Object.keys(userProfile).length > 0 && Math.random() < tailorProbability) {
                    const sortedTags = Object.keys(userProfile).sort((a, b) => userProfile[b] - userProfile[a]);
                    const topTags = sortedTags.slice(0, 10);
                    internalQuery = topTags[Math.floor(Math.random() * topTags.length)];
                } else {
                    internalQuery = getRandomQuery();
                }
            }

            const searchQuery = `${internalQuery} #shorts`;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(searchQuery)}&type=video&videoDuration=short&relevanceLanguage=en&regionCode=US&key=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    let newVideos = data.items.sort(() => Math.random() - 0.5);
                    if (isAutoFetch) {
                        videos = videos.concat(newVideos);
                    } else {
                        videos = newVideos;
                        currentIndex = 0;
                        loadVideo();
                    }
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function extractTagsAndUpdateProfile(videoId, weight) {
            const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const tags = data.items[0].snippet.tags;
                    if (tags) {
                        tags.forEach(tag => {
                            let cleanTag = tag.toLowerCase();
                            userProfile[cleanTag] = (userProfile[cleanTag] || 0) + weight;
                        });
                        totalWeightedWatchTime += weight;
                    }
                }
            } catch (error) {
                console.error(error);
            }
        }

        function processVideoWatchTime() {
            if (!videos[currentIndex]) return;
            const durationWatched = (Date.now() - videoStartTime) / 1000;
            
            if (durationWatched > 2) { 
                const weight = Math.min(Math.floor(durationWatched), 60);
                const videoId = videos[currentIndex].id.videoId;
                extractTagsAndUpdateProfile(videoId, weight);
            }
        }

        function manualSearch() {
            processVideoWatchTime();
            fetchVideos(false);
        }

        function loadVideo() {
            if (videos.length > 0 && videos[currentIndex]) {
                const videoId = videos[currentIndex].id.videoId;
                document.getElementById('videoPlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&hl=en&cc_lang_pref=en`;
                videoStartTime = Date.now();
            }
        }

        function nextVideo() {
            if (currentIndex < videos.length - 1) {
                processVideoWatchTime();
                currentIndex++;
                loadVideo();
                if (currentIndex >= videos.length - 5 && document.getElementById('searchInput').value.trim() === "") {
                    fetchVideos(true);
                }
            }
        }

        function prevVideo() {
            if (currentIndex > 0) {
                processVideoWatchTime();
                currentIndex--;
                loadVideo();
            }
        }

        window.addEventListener('wheel', (event) => {
            if (isScrolling) return;
            isScrolling = true;
            if (event.deltaY > 0) nextVideo();
            else if (event.deltaY < 0) prevVideo();
            setTimeout(() => { isScrolling = false; }, 800);
        });

        fetchVideos(false);
    </script>
</body>
</html>
